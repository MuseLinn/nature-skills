name: Validate workflow path filters

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/validate-workflows.py'
  push:
    paths:
      - '.github/workflows/**'
      - 'scripts/validate-workflows.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Run workflow validator
        run: python scripts/validate-workflows.py
